services:
  - type: worker
    name: touchline-analysis-worker
    runtime: node
    region: oregon # Change to 'frankfurt' if your DB/Redis is in EU
    repo: https://github.com/YonatanAwoke/touchline
    branch: main
    buildCommand: npm install -g bun && bun install
    startCommand: cd apps/backend && bun run src/workers/analysis-worker.ts
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_PIPELINE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
