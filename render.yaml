services:
  - type: worker
    name: touchline-analysis-worker
    runtime: docker
    region: oregon # Change to 'frankfurt' if your DB/Redis is in EU
    repo: https://github.com/YonatanAwoke/touchline
    branch: main
    dockerfilePath: ./Dockerfile.worker
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_PIPELINE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
