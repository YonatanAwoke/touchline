<!doctype html>
<html lang="en">
  <head>

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:description"
      content="Real-time match analysis, player tracking, and tactical insights powered by AI."

    <meta name="twitter:image" content="https://i.postimg.cc/7PT0TTQy/T.png" />

    <!-- Theme Color (Mobile Browser UI Color) -->
    <meta name="theme-color" content="#0F172A" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"

    <script type="application/ld+json">
      {

        "name": "Touchline",
        "applicationCategory": "SportsAnalyticsApplication",
        "operatingSystem": "Web",
        "description": "AI-powered football analytics platform for teams, coaches, and players.",
